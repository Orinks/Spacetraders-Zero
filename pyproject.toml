[build-system]
requires = [
    "setuptools~=69.1",  # Pin to 69.1.x series
    "wheel",
    "packaging>=21.0,<22.0",  # Match safety's requirement
]
build-backend = "setuptools.build_meta"

[project]
name = "spacetraders-zero"
version = "0.1.0"
description = "A Python client for SpaceTraders API"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.12"
dependencies = [
    "requests>=2.31.0",
    "pydantic>=2.5.2,<3.0.0",  # Use newer version compatible with Python 3.12
    "python-dotenv>=1.0.0",
    "responses>=0.24.1",
    "aiohttp>=3.9.1",
]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["*"]
