name: Validate and Secure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly security scan

jobs:
  validate:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.12']
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Upgrade pip
      shell: bash
      run: |
        python -m pip install --upgrade pip wheel
        python -m pip install build  # Add this to handle pyproject.toml
    
    - name: Install Linux system dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-dev \
          python3-pip \
          python3-wxgtk4.0 \
          libgtk-3-dev \
          pkg-config
    
    - name: Install Python dependencies (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        # Install all dependencies at once with constraints
        pip install -e . -r requirements.txt -c constraints.txt pytest pytest-mock mypy types-requests bandit safety
        # Remove wxPython from runtime dependencies for Linux
        pip uninstall -y wxPython
    
    - name: Install Python dependencies (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        # Install all dependencies at once with constraints
        pip install -e . -r requirements.txt -c constraints.txt pytest pytest-mock mypy types-requests bandit safety
    
    - name: Run config tests
      shell: bash
      run: |
        python -m pytest tests/test_config.py -v
    
    - name: Run other tests
      env:
        SPACETRADERS_TOKEN: test-token
        SPACETRADERS_API_URL: https://api.spacetraders.io/v2
      shell: bash
      run: |
        python -m pytest tests/test_client.py tests/test_trader.py tests/test_selling.py -v
    
    - name: Run type checking
      shell: bash
      run: |
        python -m mypy src/
    
    - name: Run security checks
      shell: bash
      run: |
        bandit -r src/
        safety check

  create-tag:
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Create date-based tag
      shell: bash
      run: |
        TAG_NAME=$(date +'%Y.%m.%d-%H%M')
        git tag $TAG_NAME
        git push origin $TAG_NAME
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
