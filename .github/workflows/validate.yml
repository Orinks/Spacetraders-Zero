name: Validate and Secure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly security scan

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-dev \
          python3-pip
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip wheel setuptools
        pip install mypy types-requests bandit safety
        pip install -e .[test]
    
    - name: Run tests
      run: |
        echo "Current directory: $(pwd)"
        echo "Directory contents:"
        ls -la
        echo "Tests directory contents:"
        ls -la tests/
        echo "Python path:"
        python -c "import sys; print('\n'.join(sys.path))"
        echo "Environment variables:"
        env
        echo "Test file contents:"
        cat tests/test_config.py
        echo "Running tests with -s..."
        python -m pytest -v -vv -s tests/ || python -m pytest -v -vv -s tests/test_config.py
    
    - name: Run type checking
      run: |
        mypy src/
    
    - name: Run security checks
      run: |
        bandit -r src/
        safety check

  create-tag:
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Create date-based tag
      run: |
        TAG="v$(date +'%Y.%m.%d')"
        git tag $TAG
        git push origin $TAG
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
