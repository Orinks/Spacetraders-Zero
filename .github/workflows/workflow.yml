name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install Linux system dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev python3-pip libgtk-3-dev pkg-config

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip wheel
        pip install pytest pytest-mock mypy types-requests bandit safety==2.3.5 jsonschema responses pip-tools
        
    - name: Install project dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        grep -v "wxPython" requirements.in > requirements.linux.in
        pip-compile requirements.linux.in --output-file=requirements.linux.txt --no-emit-index-url
        pip install -r requirements.linux.txt
        pip install -e .
        
    - name: Install project dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        pip install -r requirements.txt
        pip install -e .
    
    - name: Run tests
      env:
        SPACETRADERS_TOKEN: test-token
        SPACETRADERS_API_URL: https://api.spacetraders.io/v2
      run: |
        python -m pytest tests/ -v
        python -m mypy src
        python -m bandit -r src/ --skip B311
        python -m safety check