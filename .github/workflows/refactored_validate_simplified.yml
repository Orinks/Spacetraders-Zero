
name: Validate and Secure (Simplified Version)

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Run in test mode'
        required: false
        default: 'true'
  pull_request:
    paths:
      - '.github/workflows/refactored_validate_simplified.yml'

jobs:
  validate:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.12']
    runs-on: ${{ matrix.os }}
    steps:
    - name: Debug Event
      env:
        DEBUG_EVENT: ${{ toJSON(github.event) }}
      run: echo "$DEBUG_EVENT"

    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Upgrade pip and install tools
      run: python -m pip install --upgrade pip wheel pip-tools build
    
    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-wxgtk4.0 libgtk-3-dev pkg-config
    
    - name: Install wxPython (Windows)
      if: runner.os == 'Windows'
      run: pip install wxPython
    
    - name: Compile requirements
      run: |
        pip-compile requirements.in --output-file=requirements.txt --no-emit-index-url
        pip-compile dev-requirements.in --output-file=dev-requirements.txt --no-emit-index-url
    
    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest==7.4.3 pytest-mock>=3.14.0 mypy>=1.13.0 types-requests>=2.32.0 bandit>=1.8.0 safety==2.3.5 jsonschema>=4.20.0 responses>=0.24.1
        pip install -e .
    
    - name: Run all tests
      env:
        SPACETRADERS_TOKEN: test-token
        SPACETRADERS_API_URL: https://api.spacetraders.io/v2
      run: |
        python -m pytest tests/test_config.py -v
        python -m pytest tests/test_client.py -v
        python -m pytest tests/test_client_logging.py -v
        python -m pytest tests/test_client_optimizations.py -v
        python -m pytest tests/test_gameplay.py -v
        python -m pytest tests/test_mining.py -v
        python -m pytest tests/test_persistence.py -v
        python -m pytest tests/test_selling.py -v
        python -m pytest tests/test_trader.py -v
    
    - name: Run type checking
      run: python -m mypy src
    
    - name: Run security checks
      run: |
        python -m bandit -r src/ --skip B311
        python -m safety check

  create-tag:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Create date-based tag
      run: |
        TAG_NAME=$(date +'%Y.%m.%d-%H%M')
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git tag $TAG_NAME
        git push origin $TAG_NAME
      env:
        GITHUB_TOKEN: ${{ github.token }}
